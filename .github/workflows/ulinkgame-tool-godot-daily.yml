name: ULinkGame Tool Godot Daily

on:
  schedule:
    - cron: '30 17 * * *'
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GODOT_VERSION: 4.6.1
  GODOT_MONO_ARCHIVE: Godot_v4.6.1-stable_mono_linux_x86_64.zip

jobs:
  verify-godot-tool:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - transport: websocket
            serializer: memorypack
          - transport: tcp
            serializer: json
          - transport: kcp
            serializer: memorypack
    name: Verify ULinkGame Godot tool (${{ matrix.transport }} + ${{ matrix.serializer }})

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Godot Mono
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/godot"
          curl -fL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/${GODOT_MONO_ARCHIVE}" -o "$RUNNER_TEMP/godot/${GODOT_MONO_ARCHIVE}"
          unzip -q "$RUNNER_TEMP/godot/${GODOT_MONO_ARCHIVE}" -d "$RUNNER_TEMP/godot"

      - name: Resolve Godot paths
        run: |
          set -euo pipefail
          GODOT_BIN="$(find "$RUNNER_TEMP/godot" -maxdepth 2 -type f \( -name 'Godot_v*-stable_mono_linux.x86_64' -o -name 'Godot_v*-stable_mono_linux_x86_64' \) | head -n 1)"
          GODOT_NUPKGS="$(find "$RUNNER_TEMP/godot" -type d -path '*/GodotSharp/Tools/nupkgs' | head -n 1)"

          if [ -z "$GODOT_BIN" ] || [ -z "$GODOT_NUPKGS" ]; then
            echo "Failed to locate Godot binary or GodotSharp nupkgs." >&2
            exit 1
          fi

          chmod +x "$GODOT_BIN"

          {
            echo "GODOT_BIN=$GODOT_BIN"
            echo "GODOT_NUPKGS=$GODOT_NUPKGS"
          } >> "$GITHUB_ENV"

      - name: Verify ulinkgame-tool generated Godot networking
        env:
          ULINKGAME_TOOL_TRANSPORT: ${{ matrix.transport }}
          ULINKGAME_TOOL_SERIALIZER: ${{ matrix.serializer }}
        run: bash ./scripts/ci/verify-ulinkgame-tool-godot.sh
