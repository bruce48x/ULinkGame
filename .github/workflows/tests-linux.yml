name: Tests Linux

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - Tests/**
  pull_request:
    paths:
      - src/**
      - Tests/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Inspect workspace
        run: |
          pwd
          ls
          find Tests -maxdepth 2 -name "*.csproj" -print

      - name: Ensure local NuGet feed path exists
        run: mkdir -p artifacts

      - name: Restore test projects
        run: |
          for project in $(find Tests -maxdepth 2 -name "*.csproj" -print); do
            dotnet restore "$project"
          done

      - name: Test client package
        run: dotnet test "${{ github.workspace }}/Tests/ULinkGame.Client.Tests/ULinkGame.Client.Tests.csproj" --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test server package
        run: dotnet test "${{ github.workspace }}/Tests/ULinkGame.Server.Tests/ULinkGame.Server.Tests.csproj" --no-restore -m:1 /nr:false /p:UseSharedCompilation=false
